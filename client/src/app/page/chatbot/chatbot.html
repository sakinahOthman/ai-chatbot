<section id="chat-page" class="page active">
  <div class="page-header">
    <h2>Baby Sleep Consultant</h2>
    <p>Ask me anything about baby sleep patterns and routines</p>
  </div>

  <div class="messages-container" id="messages-container">
    <div class="date-group" *ngFor="let group of groupedMessages">
      <div class="date-header">{{ group.date | date:"EEEE, MMMM d, y" }}</div>
      <div class="message-box" *ngFor="let message of group.messages">
        <div class="message" [ngClass]="{ 'bot-message': !message.isUser, 'user-message': message.isUser }">
          <div class="message-avatar" [ngClass]="{ 'bot-avatar': !message.isUser, 'user-avatar': message.isUser }">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12h.01"></path>
              <path d="M15 12h.01"></path>
              <path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"></path>
              <path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"></path>
            </svg>
          </div>
          <div *ngIf="message.isLoading" class="loader">
          </div>
          <div class="message-bubble" *ngIf="!message.isLoading">
            <p [innerHTML]="message.text"></p>
            <span class="message-time">{{ message.timestamp | date:"hh:mm a" }}</span>
          </div>
        </div>
      </div>
    </div>
    
  </div>

  <div class="input-container">
    <form class="chatbot-form" (ngSubmit)="sendMessage()" autocomplete="off">
      <input
        type="text"
        class="chat-input"
        placeholder="Type your question about baby sleep..."
        [(ngModel)]="userInput"
        name="message"
        required
        aria-label="Type your message"
      />
    </form>
    <button id="send-button" type="submit" class="send-button">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m22 2-7 20-4-9-9-4Z"></path>
        <path d="M22 2 11 13"></path>
      </svg>
      <span>Send</span>
    </button>
  </div>
  <p class="input-hint">Press Enter to send • This is an AI assistant for informational purposes only</p>
</section>
